services:
  mongodb:
    image: mongo:latest
    container_name: skin4all_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: skin4all
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skin4all_backend
    environment:
      NODE_ENV: development
      PORT: 5001
      DB_HOST: mongodb
      DB_PORT: 27017
      DB_USERNAME: admin
      DB_PASSWORD: password123
      DB_NAME: skin4all
    ports:
      - "5001:5001"
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install -g pnpm && pnpm install && pnpm run start:dev"

volumes:
  mongo-data:
  node_modules:
